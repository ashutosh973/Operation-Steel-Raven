name: Deploy playable demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Install dependencies
        run: npm ci

      - name: Lint source
        run: npm run lint

      - name: Build and test static site
        run: npm test
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.base_url }}
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ vars.PLAUSIBLE_DOMAIN }}

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  cleanup:
    name: Remove superseded public metadata
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      actions: write
      deployments: write
    steps:
      - name: Keep only the current workflow run and deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for run_id in $(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-pages.yml/runs?per_page=100" \
              --jq ".workflow_runs[] | select(.id != ${GITHUB_RUN_ID}) | .id"
          ); do
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
          done

          for deployment_id in $(
            gh api "repos/${GITHUB_REPOSITORY}/deployments?per_page=100" \
              --jq ".[] | select(.sha != \"${GITHUB_SHA}\") | .id"
          ); do
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}"
          done
